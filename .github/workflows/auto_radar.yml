name: Daily Radar Auto-Run

on:
  schedule:
    # 正確排程：台灣時間晚上 8:37 執行 (UTC 中午 12:37)
    # 這樣才能確保抓到台股完全收盤、且三大法人籌碼結算完畢的最終資料
    - cron: '37 12 * * 1-5'
  workflow_dispatch: # 保留手動點擊功能

permissions:
  contents: write # 確保 Action 有權限將資料推回倉庫

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 檢索倉庫代碼
        uses: actions/checkout@v4

      - name: 2. 建立 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 優化點：開啟 pip 快取，加快後續運行速度

      - name: 3. 安裝雷達必備套件
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests FinMind beautifulsoup4

      - name: 4. 啟動彼夫有擇戰情室核心引擎
        run: python radar.py

      - name: 5. 自動上傳最新戰報 JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          # 檢查是否有檔案變動，避免無謂的提交報錯
          git add plum_blossom_data.json ocean_history.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🎡 自動更新：全域戰情室雷達掃描完成"
            git push
          fi
