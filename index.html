<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全域雷達｜彼夫有擇量化戰情室 V7</title>
    <style>
        /* =========================================
           1. 核心主題設定
           ========================================= */
        :root {
            --ocean-bg: radial-gradient(circle at top, #0A192F 0%, #020C1B 100%);
            --panel-bg: rgba(16, 32, 64, 0.75);
            --panel-border: rgba(100, 255, 218, 0.2);
            --text-main: #E6F1FF;
            --text-muted: #8892B0;
            --neon-cyan: #64FFDA;
            --neon-green: #00E676;
            --neon-red: #FF5252;
            --neon-gold: #FFD700;
            --title-bg: rgba(0, 0, 0, 0.4);
            --badge-bg: rgba(0, 0, 0, 0.2);
            --sim-bg: rgba(0, 0, 0, 0.2);
            --input-bg: rgba(0, 0, 0, 0.3);
            --watch-bg: rgba(255, 255, 255, 0.05);
            --watch-border: rgba(255, 255, 255, 0.1);
            --card-shadow: rgba(0, 0, 0, 0.4);
            --log-bg: rgba(100, 255, 218, 0.05);
            --ind-badge-bg: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light-ocean"] {
            --ocean-bg: linear-gradient(135deg, #E0F2F1 0%, #B2EBF2 50%, #81D4FA 100%);
            --panel-bg: rgba(255, 255, 255, 0.75);
            --panel-border: rgba(0, 138, 162, 0.3);
            --text-main: #003B46; 
            --text-muted: #006064;
            --neon-cyan: #00838F; 
            --neon-green: #00897B; 
            --neon-red: #D32F2F; 
            --neon-gold: #F57F17; 
            --title-bg: rgba(255, 255, 255, 0.6);
            --badge-bg: rgba(0, 131, 143, 0.1);
            --sim-bg: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.8);
            --watch-bg: rgba(0, 0, 0, 0.03);
            --watch-border: rgba(0, 0, 0, 0.1);
            --card-shadow: rgba(0, 96, 100, 0.15);
            --log-bg: rgba(0, 131, 143, 0.05);
            --ind-badge-bg: rgba(0, 131, 143, 0.1);
        }

        body {
            background: var(--ocean-bg); background-attachment: fixed; color: var(--text-main);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; margin: 0; padding: 20px; min-height: 100vh;
            transition: background 0.6s ease, color 0.6s ease; 
        }

        .theme-toggle-btn { position: fixed; top: 20px; right: 20px; z-index: 1000; background: var(--panel-bg); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s ease; backdrop-filter: blur(5px); box-shadow: 0 4px 15px var(--card-shadow); font-size: 14px; }
        .top-nav { max-width: 1200px; margin: 0 auto 30px; display: flex; flex-direction: column; align-items: center; gap: 15px; border-bottom: 1px solid var(--panel-border); padding-bottom: 20px; }
        .search-box { background: var(--panel-bg); border: 1px solid var(--neon-cyan); border-radius: 30px; padding: 10px 25px; width: 100%; max-width: 400px; color: var(--text-main); font-size: 16px; outline: none; box-shadow: 0 0 15px var(--card-shadow); text-align: center; transition: 0.3s ease; }
        .header { text-align: center; width: 100%; }
        .header h1 { margin: 0; letter-spacing: 2px; text-shadow: 0 0 10px var(--panel-border); font-size: 28px; }
        .version-badge { font-size: 14px; background: var(--neon-cyan); color: #000; padding: 3px 8px; border-radius: 6px; font-weight: bold; vertical-align: middle; }
        .update-time { font-size: 12px; color: var(--neon-cyan); opacity: 0.8; margin-top: 5px; margin-bottom: 15px; }

        .pool-section { margin-bottom: 30px; max-width: 1400px; margin-left: auto; margin-right: auto; }
        .pool-section summary { list-style: none; cursor: pointer; outline: none; }
        .pool-title { font-size: 20px; font-weight: bold; color: var(--neon-cyan); background: var(--title-bg); padding: 12px 20px; border-left: 4px solid var(--neon-cyan); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .pool-title::after { content: '▼'; font-size: 14px; transition: 0.3s; }
        details[open] .pool-title::after { transform: rotate(180deg); }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; padding: 20px 0; }
        
        /* 🏷️ 產業分隔線與摺疊樣式 (復原區) */
        .industry-details { margin-top: 15px; border-bottom: 1px dashed var(--panel-border); padding-bottom: 10px; transition: 0.3s; }
        .industry-details summary { list-style: none; cursor: pointer; outline: none; display: flex; justify-content: space-between; align-items: center; }
        .industry-section-title { color: var(--neon-gold); font-size: 17px; font-weight: bold; letter-spacing: 1px; padding: 10px 5px; margin: 0; }
        .ind-arrow { font-size: 12px; opacity: 0.6; transition: transform 0.3s; color: var(--neon-cyan); }
        .industry-details[open] .ind-arrow { transform: rotate(180deg); }

        .card { background: var(--panel-bg); backdrop-filter: blur(10px); border-radius: 15px; padding: 22px; border: 1px solid var(--panel-border); border-top: 4px solid var(--text-muted); box-shadow: 0 10px 30px var(--card-shadow); transition: 0.4s ease; position: relative; }
        .card.is-buy { border-top-color: var(--neon-green); }
        .stock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .stock-id { font-size: 26px; font-weight: bold; color: var(--neon-cyan); }
        .industry-badge { background: var(--ind-badge-bg); color: var(--text-main); font-size: 11px; padding: 2px 6px; border-radius: 4px; }
        
        .data-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; color: var(--text-muted); }
        .data-row b { color: var(--text-main); font-size: 16px; }
        .highlight { color: var(--neon-cyan) !important; font-size: 20px !important; }

        .action-box { margin-top: 15px; padding: 10px; text-align: center; font-weight: bold; border-radius: 6px; font-size: 15px; }
        .action-box.buy { background: rgba(0,255,0,0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
        .action-box.watch { background: var(--watch-bg); color: var(--text-muted); border: 1px solid var(--watch-border); }

        .sim-panel { margin-top: 15px; padding: 12px; background: var(--sim-bg); border-radius: 8px; border-top: 1px dashed var(--panel-border); }
        .sim-input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .sim-input { width: 100%; background: var(--input-bg); border: 1px solid var(--panel-border); border-radius: 4px; color: var(--neon-cyan); padding: 5px; font-size: 13px; outline: none; }
        .sim-result { font-size: 12px; border-top: 1px dashed var(--panel-border); padding-top: 10px; }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 5px; }

        .footer-copyright { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 12px; }
    </style>
</head>
<body>

    <button id="theme-toggle" class="theme-toggle-btn">✨ 切換輕淡海洋版</button>

    <div class="top-nav">
        <div class="header">
            <h1>🌌 彼夫有擇全域戰情室 <span class="version-badge">V7.0.4</span></h1>
            <div id="update-time" class="update-time">衛星同步中...</div>
            <input type="text" id="global-search" class="search-box" placeholder="🛸 啟動聲納：輸入代碼開啟模擬探測...">
        </div>
    </div>

    <div id="search-result-container" class="pool-section" style="display:none;">
        <details open>
            <summary><div class="pool-title">🛰️ 搜尋結果探測</div></summary>
            <div id="search-grid" class="grid-container"></div>
        </details>
    </div>

    <div id="main-container"></div>

    <footer class="footer-copyright">
        <p>© <span id="current-year"></span> 彼夫有擇全域戰情室. All Rights Reserved.</p>
    </footer>

    <script>
        document.getElementById('current-year').innerText = new Date().getFullYear();

        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.addEventListener('click', () => {
            const root = document.documentElement;
            if (root.getAttribute('data-theme') === 'light-ocean') {
                root.removeAttribute('data-theme');
                themeBtn.innerText = '✨ 切換輕淡海洋版';
            } else {
                root.setAttribute('data-theme', 'light-ocean');
                themeBtn.innerText = '🌌 切換深海太空版';
            }
        });

        let fullData = null;

        function updateSim(uniqueId) {
            const price = parseFloat(document.getElementById(`price-${uniqueId}`).value) || 0;
            const targetPct = parseFloat(document.getElementById(`target-pct-${uniqueId}`).value) || 0;
            const stopPct = parseFloat(document.getElementById(`stop-pct-${uniqueId}`).value) || 0;
            if (price > 0) {
                document.getElementById(`profit-${uniqueId}`).innerText = (price * (1 + targetPct/100)).toFixed(2);
                document.getElementById(`loss-${uniqueId}`).innerText = (price * (1 - stopPct/100)).toFixed(2);
            } else {
                document.getElementById(`profit-${uniqueId}`).innerText = '--';
                document.getElementById(`loss-${uniqueId}`).innerText = '--';
            }
        }

        function createCard(s, isWangYang = false, prefix = "main-") {
            const isBuy = s.action === '買入加碼';
            const instText = s.inst_buy > 0 ? '+' + s.inst_buy : s.inst_buy;
            const indText = s.industry || '未分類';
            const uniqueId = prefix + s.stock_id;

            return `
                <div class="card ${isBuy ? 'is-buy' : ''}">
                    <div class="stock-header">
                        <div>
                            <span class="stock-id">${s.stock_id}</span>
                            <span class="stock-name">${s.stock_name} <span class="industry-badge">${indText}</span></span>
                        </div>
                        <div class="inst-badge" style="color:var(--neon-gold); font-size:12px;">30日法人 ${instText}</div>
                    </div>
                    <div class="data-row"><span>現價</span><b class="highlight">${s.close}</b></div>
                    <div class="data-row"><span>成交量</span><b>${s.volume.toLocaleString()}</b></div>
                    <div class="data-row"><span>5MA/30MA</span><b>${s.ma5}/${s.ma30}</b></div>
                    
                    <div class="action-box ${isBuy ? 'buy' : 'watch'}">
                        ${isBuy ? '🚀 買入加碼' : '📡 靜候觀察'}
                    </div>

                    <div class="sim-panel">
                        <div class="sim-input-grid">
                            <input type="number" id="price-${uniqueId}" class="sim-input" placeholder="持股價" oninput="updateSim('${uniqueId}')">
                            <input type="number" id="target-pct-${uniqueId}" class="sim-input" value="50" oninput="updateSim('${uniqueId}')">
                        </div>
                        <div class="sim-result">
                            <div class="result-row"><span>🎯 停利點</span><b id="profit-${uniqueId}" style="color: var(--neon-cyan);">--</b></div>
                            <div class="result-row"><span>✂️ 停損點</span><b id="loss-${uniqueId}" style="color: var(--neon-red);">--</b></div>
                        </div>
                    </div>
                </div>
            `;
        }

        fetch('plum_blossom_data.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(json_data => {
                fullData = json_data;
                document.getElementById('update-time').innerText = "⏱️ 雷達更新：" + json_data.last_updated;
                const container = document.getElementById('main-container');
                
                // 🎯 核心排序與精確匹配
                const displayOrder = ["🌟 彼神黃金魚池", "🔭 測試員觀察水域", "🐅 三日成猛虎水池", "🔥 姊夫爆發小魚池", "🍁 楓大永動魚池", "🌊 汪洋大魚"];

                displayOrder.forEach(poolName => {
                    if (json_data.pools[poolName] && json_data.pools[poolName].length > 0) {
                        const stocks = json_data.pools[poolName];
                        const section = document.createElement('details');
                        section.className = 'pool-section';
                        
                        // 預設展開
                        if (poolName === "🌟 彼神黃金魚池" || poolName === "🔭 測試員觀察水域") section.open = true;
                        
                        section.innerHTML = `<summary><div class="pool-title">${poolName}</div></summary>`;
                        
                        // 🌊 災難復原：把汪洋大魚的「產業分類摺疊」加回來！
                        if (poolName === "🌊 汪洋大魚") {
                            let sortedStocks = stocks.sort((a, b) => (b.inst_buy - a.inst_buy) || (b.close - a.close));
                            const industryGroups = {};
                            sortedStocks.forEach(s => {
                                const ind = s.industry || "未分類產業";
                                if (!industryGroups[ind]) industryGroups[ind] = [];
                                industryGroups[ind].push(s);
                            });
                            
                            for (const [ind, indStocks] of Object.entries(industryGroups)) {
                                const indDetails = document.createElement('details');
                                indDetails.className = 'industry-details';
                                indDetails.innerHTML = `<summary><div class="industry-section-title">🏷️ 【${ind}】族群 (${indStocks.length} 檔) <span class="ind-arrow">▼</span></div></summary>`;
                                
                                const indGrid = document.createElement('div');
                                indGrid.className = 'grid-container';
                                indGrid.style.paddingTop = "5px";
                                indStocks.forEach(s => indGrid.innerHTML += createCard(s, true, 'main-'));
                                
                                indDetails.appendChild(indGrid);
                                section.appendChild(indDetails);
                            }
                        } else {
                            // 其他魚池的一般渲染
                            const grid = document.createElement('div');
                            grid.className = 'grid-container';
                            stocks.forEach(s => grid.innerHTML += createCard(s, false, 'main-'));
                            section.appendChild(grid);
                        }
                        
                        container.appendChild(section);
                    }
                });

                // 🛠️ 防遺漏迴圈
                for (const [poolName, stocks] of Object.entries(json_data.pools)) {
                    if (!displayOrder.includes(poolName) && stocks.length > 0) {
                        const section = document.createElement('details');
                        section.className = 'pool-section';
                        section.innerHTML = `<summary><div class="pool-title">${poolName}</div></summary>`;
                        const grid = document.createElement('div');
                        grid.className = 'grid-container';
                        stocks.forEach(s => grid.innerHTML += createCard(s, false, 'main-'));
                        section.appendChild(grid);
                        container.appendChild(section);
                    }
                }
            });

        document.getElementById('global-search').addEventListener('input', (e) => {
            const code = e.target.value.trim();
            const searchGrid = document.getElementById('search-grid');
            const searchContainer = document.getElementById('search-result-container');
            if (code.length >= 2 && fullData) {
                searchGrid.innerHTML = '';
                let found = false;
                for (const stocks of Object.values(fullData.pools)) {
                    const match = stocks.find(s => s.stock_id === code);
                    if (match) {
                        searchGrid.innerHTML = createCard(match, false, 'search-');
                        found = true;
                        break;
                    }
                }
                searchContainer.style.display = found ? 'block' : 'none';
            } else {
                searchContainer.style.display = 'none';
            }
        });
    </script>
</body>
</html>
