<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test V7 Claude | 戰情室系統</title>
    <style>
        /* ============================================================
           1. 變數與主題設定 (Variables & Themes)
           ============================================================ */
        :root {
            --ocean-bg: radial-gradient(circle at top, #0A192F 0%, #020C1B 100%);
            --panel-bg: rgba(16, 32, 64, 0.75);
            --panel-border: rgba(100, 255, 218, 0.2);
            --text-main: #E6F1FF;
            --text-muted: #8892B0;
            --neon-cyan: #64FFDA;
            --neon-green: #00E676;
            --neon-red: #FF5252;
            --neon-gold: #FFD700;
            --title-bg: rgba(0, 0, 0, 0.4);
            --badge-bg: rgba(0, 0, 0, 0.2);
            --sim-bg: rgba(0, 0, 0, 0.2);
            --input-bg: rgba(0, 0, 0, 0.3);
            --watch-bg: rgba(255, 255, 255, 0.05);
            --watch-border: rgba(255, 255, 255, 0.1);
            --card-shadow: rgba(0, 0, 0, 0.4);
            --log-bg: rgba(100, 255, 218, 0.05);
            --note-bg: rgba(255, 215, 0, 0.05);
            --ind-badge-bg: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light-ocean"] {
            --ocean-bg: linear-gradient(135deg, #E0F2F1 0%, #B2EBF2 50%, #81D4FA 100%);
            --panel-bg: rgba(255, 255, 255, 0.75);
            --panel-border: rgba(0, 138, 162, 0.3);
            --text-main: #003B46; 
            --text-muted: #006064;
            --neon-cyan: #00838F; 
            --neon-green: #00897B; 
            --neon-red: #D32F2F; 
            --neon-gold: #F57F17; 
            --title-bg: rgba(255, 255, 255, 0.6);
            --badge-bg: rgba(0, 131, 143, 0.1);
            --sim-bg: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.8);
            --watch-bg: rgba(0, 0, 0, 0.03);
            --watch-border: rgba(0, 0, 0, 0.1);
            --card-shadow: rgba(0, 96, 100, 0.15);
            --log-bg: rgba(0, 131, 143, 0.05);
            --note-bg: rgba(245, 127, 23, 0.05);
            --ind-badge-bg: rgba(0, 131, 143, 0.1);
        }

        /* ============================================================
           2. 基礎佈局 (Base Layout)
           ============================================================ */
        body {
            background: var(--ocean-bg);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            transition: background 0.6s ease, color 0.6s ease; 
        }

        .top-nav {
            max-width: 1200px;
            margin: 0 auto 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 20px;
        }

        /* ============================================================
           3. UI 組件 (UI Components)
           ============================================================ */
        /* 主題切換按鈕 */
        .theme-toggle-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: var(--panel-bg); color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan); padding: 8px 16px;
            border-radius: 20px; cursor: pointer; font-weight: bold;
            transition: 0.3s ease; backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px var(--card-shadow);
        }

        /* 搜尋框 */
        .search-box {
            background: var(--panel-bg); border: 1px solid var(--neon-cyan);
            border-radius: 30px; padding: 10px 25px; width: 100%;
            max-width: 400px; color: var(--text-main); font-size: 16px;
            outline: none; box-shadow: 0 0 15px var(--card-shadow);
            text-align: center; transition: 0.3s ease;
        }

        /* 系統公告 */
        .system-alert {
            background: var(--note-bg); border: 1px solid var(--neon-gold);
            border-radius: 8px; padding: 12px 20px; margin: 10px auto 20px;
            max-width: 800px; color: var(--neon-gold); font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.2); }
            50% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
        }

        /* ============================================================
           4. 股票卡片與網格 (Card & Grid)
           ============================================================ */
        .pool-section { margin-bottom: 30px; max-width: 1400px; margin: 0 auto 30px; }
        
        .pool-title {
            font-size: 20px; font-weight: bold; color: var(--neon-cyan);
            background: var(--title-bg); padding: 12px 20px;
            border-left: 4px solid var(--neon-cyan); border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        .card {
            background: var(--panel-bg); backdrop-filter: blur(10px);
            border-radius: 15px; padding: 22px; border: 1px solid var(--panel-border);
            border-top: 4px solid var(--text-muted);
            box-shadow: 0 10px 30px var(--card-shadow);
            transition: 0.4s ease; position: relative;
        }

        .card.is-buy { border-top-color: var(--neon-green); }
        
        /* 模擬倉樣式 */
        .sim-panel {
            margin-top: 15px; padding: 12px;
            background: var(--sim-bg); border-radius: 8px;
            border-top: 1px dashed var(--panel-border);
        }
    </style>
</head>
<body>

    <button id="theme-toggle" class="theme-toggle-btn">✨ 切換輕淡海洋版</button>

    <div class="top-nav">
        <header class="header">
            <h1>Test V7 Claude <span class="version-badge">V7.3 混合引擎版</span></h1>
            <div id="update-time" class="update-time">衛星同步中...</div>
            <div class="system-alert">⚡ 核心引擎 V7.3 正式上線｜FinMind 混合雙軌巡航中</div>
        </header>

        <details class="info-section">
            <summary>📜 改版歷程細節</summary>
            <div class="log-content">
                <b>✅ V7.3 混合引擎升級：</b>
                <ul>
                    <li><b>精準數據源：</b>導入 FinMind 精確數據。</li>
                    <li><b>混合掃描架構：</b>Yahoo 快速粗篩 + FinMind 深度精濾。</li>
                </ul>
            </div>
        </details>

        <input type="text" id="global-search" class="search-box" placeholder="🛸 啟動聲納：輸入代碼開啟模擬探測...">
    </div>

    <main id="main-container"></main>

    <footer class="footer-copyright">
        <p>© <span id="current-year"></span> 彼夫有擇全域戰情室. All Rights Reserved.</p>
    </footer>

    <script>
        /* ============================================================
           JavaScript 邏輯區
           ============================================================ */
        
        // 1. 初始化與主題切換
        document.getElementById('current-year').innerText = new Date().getFullYear();
        const themeBtn = document.getElementById('theme-toggle');
        
        themeBtn.addEventListener('click', () => {
            const isLight = document.documentElement.getAttribute('data-theme') === 'light-ocean';
            document.documentElement.setAttribute('data-theme', isLight ? '' : 'light-ocean');
            themeBtn.innerText = isLight ? '✨ 切換輕淡海洋版' : '🌌 切換深海太空版';
        });

        // 2. 模擬倉計算邏輯
        function updateSim(uniqueId) {
            const price = parseFloat(document.getElementById(`price-${uniqueId}`).value) || 0;
            const targetPct = parseFloat(document.getElementById(`target-pct-${uniqueId}`).value) || 0;
            const stopPct = parseFloat(document.getElementById(`stop-pct-${uniqueId}`).value) || 0;
            
            const profitEl = document.getElementById(`profit-${uniqueId}`);
            const lossEl = document.getElementById(`loss-${uniqueId}`);

            if (price > 0) {
                profitEl.innerText = (price * (1 + targetPct/100)).toFixed(2);
                lossEl.innerText = (price * (1 - stopPct/100)).toFixed(2);
            } else {
                profitEl.innerText = '--';
                lossEl.innerText = '--';
            }
        }

        // 3. 卡片生成模板 (Template String)
        function createCard(s, isWangYang = false, prefix = "main-") {
            const isBuy = s.action === '買入加碼';
            const uniqueId = prefix + s.stock_id;
            const trustBadge = s.trust_buy > 0 ? `<span style="color:var(--neon-red); font-weight:bold; margin-left:8px;">🔥 投信認養</span>` : '';

            return `
                <div class="card ${isBuy ? 'is-buy' : ''}">
                    <div class="stock-header">
                        <div>
                            <span class="stock-id">${s.stock_id}</span>
                            <span class="stock-name">${s.stock_name} <span class="industry-badge">${s.industry || '未分類'}</span>${trustBadge}</span>
                        </div>
                    </div>
                    <div class="sim-panel">
                        <div class="sim-input-grid">
                             <input type="number" id="price-${uniqueId}" class="sim-input" placeholder="持股價位" oninput="updateSim('${uniqueId}')">
                             </div>
                    </div>
                </div>
            `;
        }

        // 4. 數據讀取與渲染
        let fullData = null;
        fetch('plum_blossom_data.json?t=' + new Date().getTime())
            .then(res => res.json())
            .then(json_data => {
                fullData = json_data;
                const container = document.getElementById('main-container');
                // 渲染邏輯按原程式碼執行...
            });
    </script>
</body>
</html>
